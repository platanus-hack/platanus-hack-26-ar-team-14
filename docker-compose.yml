services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    expose:
      - "8000"
    networks:
      - web

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
